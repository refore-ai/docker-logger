version: "2"
run:
  concurrency: 4
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - dupl
    - durationcheck
    - errcheck
    - errname
    - exhaustive
    - gochecknoinits
    - goconst
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - modernize
    - nakedret
    - nestif
    - nilerr
    - prealloc
    - revive
    - staticcheck
    - testifylint
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - whitespace
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    dupl:
      threshold: 100
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - hugeParam
        - rangeValCopy
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    govet:
      enable:
        - shadow
    misspell:
      locale: US
  exclusions:
    generated: lax
    rules:
      - linters:
          - revive
        text: "package-comments: should have a package comment"
      - linters:
          - staticcheck
        text: at least one file in a package should have a package comment
      - linters:
          - gocritic
        text: "exitAfterDefer:"
      - linters:
          - gocritic
        text: "whyNoLint: include an explanation for nolint directive"
      - linters:
          - gosec
        text: "weak cryptographic primitive"
      - linters:
          - dupl
          - goconst
          - usestdlibvars
        path: _test\.go$
      - linters:
          - revive
          - unparam
          - unused
        path: _test\.go$
        text: unused-parameter
      - linters:
          - errcheck
        text: "Error return value of .*.Close.*is not checked"
      - linters:
          - revive
        path: app/syslog/
        text: "var-naming: avoid package names that conflict"
    paths:
      - vendor
      - third_party$
      - builtin$
formatters:
  exclusions:
    generated: lax
    paths:
      - vendor
      - third_party$
      - builtin$
