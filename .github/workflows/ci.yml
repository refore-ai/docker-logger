name: build

on:
  push:
    branches:
    tags:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: set up go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
        id: go

      - name: build and test
        run: |
          go test -race -timeout=60s -v -covermode=atomic -coverprofile=$GITHUB_WORKSPACE/profile.cov_tmp ./...
          go build -race ./...
          cat $GITHUB_WORKSPACE/profile.cov_tmp | grep -v "_mock.go" > $GITHUB_WORKSPACE/profile.cov
        working-directory: app
        env:
          TZ: "America/Chicago"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0
        env:
          TZ: "America/Chicago"

      - name: submit coverage
        run: |
          go install github.com/mattn/goveralls@latest
          goveralls -service="github" -coverprofile=$GITHUB_WORKSPACE/profile.cov
        env:
          COVERALLS_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            artifact: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PKG_TOKEN }}

      - uses: docker/login-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            CI=github
            GITHUB_SHA=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
          outputs: type=image,"name=ghcr.io/${{ github.actor }}/docker-logger,${{ github.actor }}/docker-logger",push-by-digest=true,name-canonical=true,push=true

      - name: export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v6
        with:
          name: digests-${{ matrix.artifact }}
          path: /tmp/digests/*
          retention-days: 1

  docker-merge:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PKG_TOKEN }}

      - uses: docker/login-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: determine tags
        id: tags
        run: |
          ref="${GITHUB_REF#refs/*/}"
          ref="${ref//\//_}"
          echo "ref=${ref}" >> $GITHUB_OUTPUT
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: create manifest and push
        working-directory: /tmp/digests
        run: |
          ref="${{ steps.tags.outputs.ref }}"
          is_tag="${{ steps.tags.outputs.is_tag }}"
          tags="-t ghcr.io/${{ github.actor }}/docker-logger:${ref} -t ${{ github.actor }}/docker-logger:${ref}"
          if [[ "$is_tag" == "true" ]]; then
            tags="${tags} -t ghcr.io/${{ github.actor }}/docker-logger:latest -t ${{ github.actor }}/docker-logger:latest"
          fi
          docker buildx imagetools create ${tags} \
            $(printf 'ghcr.io/${{ github.actor }}/docker-logger@sha256:%s ' *)
