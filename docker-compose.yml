services:
    logger:
        build: .
        image: umputun/docker-logger
        container_name: "logger"
        hostname: "logger"
        restart: always

        logging:
          driver: json-file
          options:
              max-size: "10m"
              max-file: "5"

        environment:
            - LOG_FILES=true
            - LOG_SYSLOG=false
            - EXCLUDE=docker-logger
            - MAX_FILES=10
            - MAX_SIZE=50
            - MAX_AGE=20
            - DEBUG=false
            # - TIME_ZONE=America/Chicago
            ## to run as non-root, set APP_UID to the desired user id and DOCKER_GID
            ## to the group id owning /var/run/docker.sock on the host (check with: stat -c '%g' /var/run/docker.sock)
            # - APP_UID=1001
            # - DOCKER_GID=999

        volumes:
            - ./logs:/srv/logs
            - /var/run/docker.sock:/var/run/docker.sock
